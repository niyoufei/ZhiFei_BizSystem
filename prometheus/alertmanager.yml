# Alertmanager 配置 - 擎天施组评分系统
# 文档: https://prometheus.io/docs/alerting/latest/configuration/

global:
  # 全局配置
  resolve_timeout: 5m

# 路由配置
route:
  # 根路由配置
  group_by: ['alertname', 'severity']
  group_wait: 30s           # 等待时间，用于聚合同组告警
  group_interval: 5m        # 同组告警的发送间隔
  repeat_interval: 4h       # 重复告警的发送间隔
  receiver: 'default'       # 默认接收器

  # 子路由配置
  routes:
    # 关键告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h

    # 警告级别告警
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 2h

    # 信息级别告警
    - match:
        severity: info
      receiver: 'info'
      repeat_interval: 12h

# 告警抑制规则
inhibit_rules:
  # 当服务完全不可用时，抑制其他告警
  - source_match:
      alertname: 'QingtianServiceDown'
    target_match_re:
      alertname: 'Qingtian.*'
    equal: ['job']

  # 当健康检查失败时，抑制性能告警
  - source_match:
      alertname: 'QingtianServiceUnhealthy'
    target_match:
      severity: 'warning'
    equal: ['job']

# 接收器配置
receivers:
  # 默认接收器 - 仅记录日志（适用于开发环境）
  - name: 'default'
    # 开发环境不配置实际通知渠道
    # 告警将显示在 Alertmanager UI 中

  # 关键告警接收器
  - name: 'critical'
    # 生产环境配置示例（取消注释并填入实际值）:
    #
    # 邮件通知
    # email_configs:
    #   - to: 'ops-team@example.com'
    #     from: 'alertmanager@example.com'
    #     smarthost: 'smtp.example.com:587'
    #     auth_username: 'alertmanager@example.com'
    #     auth_password: '{{ .SecretPassword }}'
    #     send_resolved: true
    #
    # Slack 通知
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/xxx/yyy/zzz'
    #     channel: '#alerts-critical'
    #     send_resolved: true
    #     title: '{{ .Status | toUpper }}: {{ .CommonAnnotations.summary }}'
    #     text: '{{ .CommonAnnotations.description }}'
    #
    # 企业微信通知
    # wechat_configs:
    #   - corp_id: 'xxx'
    #     to_party: 'xxx'
    #     agent_id: 'xxx'
    #     api_secret: 'xxx'
    #     send_resolved: true
    #
    # Webhook 通知（自定义系统集成）
    # webhook_configs:
    #   - url: 'http://your-webhook-receiver:5001/webhook'
    #     send_resolved: true

  # 警告级别接收器
  - name: 'warning'
    # 配置方式同上

  # 信息级别接收器
  - name: 'info'
    # 配置方式同上

# 模板配置（可选）
# templates:
#   - '/etc/alertmanager/templates/*.tmpl'
