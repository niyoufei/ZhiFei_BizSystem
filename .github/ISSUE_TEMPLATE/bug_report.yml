name: Bug Report
description: Report a reproducible defect or regression.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the issue clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide exact steps.
      placeholder: |
        1. Go to ...
        2. Upload ...
        3. Click ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshot / Error Message
      description: Paste logs or screenshots if available.
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version, browser.
      placeholder: macOS 15.2 / Python 3.11 / Chrome 122
