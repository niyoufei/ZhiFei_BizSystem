      - 不小于
      - 频次
      - 责任人
      - 验收
      - 旁站
      name: 措施参数化落地
      regex:
      - (?:控制在|不大于|不小于|≤|≥|<|>)\s*\d+(?:\.\d+)?
      - (?:每日|每周|每月|每班|每次|每\d+天|每\d+小时|\d+次/天|\d+次/周)
      - (?:项目经理|技术负责人|施工员|质检员|安全员|资料员|材料员|班组长)\S{0,10}(?:负责|牵头|组织|落实)
      - (?:报验|签认|验收|旁站|自检|互检|交接检|隐蔽验收)
      weight: 2
    - id: 07-4
