# Template actions
templates:
  template_07: "Led by [Responsible Position] (Suggested: Technical Manager), execute hazard list identification and special plan closure at [Frequency], complete verification/demonstration and set monitoring warning threshold [Threshold/Parameter]; implement witness/acceptance [Acceptance Action] at key nodes, and set emergency response and resumption conditions."
  template_09: "Led by [Responsible Position] (Suggested: Construction Worker), establish master/monthly/weekly/daily plan linkage, lock critical path and node clearance, resource allocation at [Frequency] (Suggested: daily + weekly); deviation trigger threshold [Threshold/Parameter], execute daily/weekly settlement and inspection/approval closure."
  template_02: "Led by [Responsible Position] (Suggested: Safety Officer), implement risk classification and hazard investigation, frequency [Frequency] (Suggested: daily + weekly), major hazard projects executed per plan; pre-shift education and witness/acceptance [Acceptance Action] closure, control indicators [Threshold/Parameter] and implement emergency plan."
  template_03: "Led by [Responsible Position] (Suggested: Construction Worker), implement enclosure and entrance management, dust control using PM10/sprinkler/fog cannon (if applicable) and inspect at [Frequency] (Suggested: daily + weekly); noise/light pollution control indicators [Threshold/Parameter], site cleaning and waste sorting [Inspection Action] closure, complaint response within time limit."
  template_default: "Led by [Responsible Position], execute inspection review at [Frequency], control indicators [Threshold/Parameter], and complete [Acceptance Action] closure."
  action_fix: "Led by [Responsible Position], complete [Frequency] and [Acceptance Action] closure, supplement [Threshold/Parameter]"
  empty_fix: "Convert commitment to quantifiable indicators [Threshold/Parameter] and clarify [Frequency] and [Acceptance Action]"

# Appendix notes
