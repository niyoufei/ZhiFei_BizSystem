  missing_param: 参数
  missing_freq: 频次
  missing_acceptance: 验收
  missing_role: 责任

# 模板动作
templates:
  template_07: 由【责任岗位】牵头（建议：技术负责人），按【频次】执行危大清单识别与专项方案闭环，完成验算/论证并设置监测预警阈值【阈值/参数】；关键节点实施旁站/验收【验收动作】，并设置应急处置与复工条件。
  template_09: 由【责任岗位】牵头（建议：施工员），建立总控/月/周/日计划联动，锁定关键线路与节点销项，资源调配按【频次】（建议：每日+每周）；纠偏触发阈值【阈值/参数】，执行日清周结与报验/签认闭环。
  template_02: 由【责任岗位】牵头（建议：安全员），实施风险分级与隐患排查，频次【频次】（建议：每日+每周），危大专项按方案执行；班前教育与旁站/验收【验收动作】闭环，控制指标【阈值/参数】并落实应急预案。
  template_03: 由【责任岗位】牵头（建议：施工员），落实围挡与出入口管理，扬尘治理采用PM10/喷淋/雾炮（如适用）并按【频次】（建议：每日+每周）巡检；噪声/光污染控制指标【阈值/参数】，场地清洁与垃圾分类按【检查动作】闭环，投诉响应限时处置。
  template_default: 由【责任岗位】牵头，按【频次】执行检查复核，控制指标【阈值/参数】，并完成【验收动作】闭环。
  action_fix: 由【责任岗位】牵头，补齐【频次】与【验收动作】闭环，补充【阈值/参数】
  empty_fix: 将承诺改为量化指标【阈值/参数】并明确【频次】与【验收动作】

# 附录说明
appendix:
  evidence_note: start_index/end_index/snippet 表示原文区间与片段引用。
  spark_hint: 如配置 OpenAI 凭证与 `gpt-5.4`，即可获得“青天 ChatGPT Judge 真评”并替换高优维度诊断内容。

