version: v2

definition:
  keywords:
    - 采用
    - 选用
    - 规格
    - 型号
    - 强度
    - 等级
    - 标准
    - 工期
    - 频次
    - 阈值
    - 控制指标
    - 样板
    - ITP
    - 检验批
  regex: &def_regex
    - (?i)C\d{2,3}
    - (?i)P\d{1,2}
    - (?i)M\d{2,3}
    - (?i)DN\s*\d{2,4}
    - (?i)\d{1,3}\s*kV
    - \d+(?:\.\d+)?\s*(?:m3|m³|m2|m²|㎡|㎥|㎠|mm|cm|m|t|kg|台|套|处|项|座|段|根|个)
    - \d+\s*(?:日历天|天|小时|h|d)
    - \d+(?:\.\d+)?\s*%
  regexes: *def_regex

analysis:
  keywords:
    - 风险
    - 难点
    - 重点
    - 痛点
    - 隐患
    - 瓶颈
    - 不利因素
    - 制约
    - 敏感
    - 影响
    - 易
    - 可能
    - 导致
    - 通病
    - 裂缝
    - 沉降
    - 变形
    - 渗漏
    - 坍塌
    - 扰民
    - 交叉作业
  regex: &ana_regex
    - 易\s*产生
    - 易\s*造成
    - 可能\s*发生
    - 存在\s*(?:较大|一定|突出)?\s*(?:风险|隐患|难点|问题)
    - 对\s*质量\s*/?\s*安全\s*/?\s*工期\s*影响
    - (?:扬尘|噪声|夜间施工|交通导改|占道|管线密集|地下水|雨季|高温|冬施)
  regexes: *ana_regex

solution:
  keywords:
    - 措施
    - 对策
    - 方案
    - 采用
    - 设置
    - 配置
    - 落实
    - 执行
    - 控制
    - 验收
    - 旁站
    - 巡检
    - 复核
    - 交底
    - 责任人
    - 责任岗位
    - 频次
    - 节点
    - 记录表
    - 台账
    - 影像
    - 检验批
    - 隐蔽验收
  regex: &sol_regex
    - (?:采取|采用|设置|增设|配置|落实|执行|实施|组织)\S{0,18}
    - (?:控制在|不大于|不小于|≤|≥|<|>)\s*\d+(?:\.\d+)?
    - (?:每日|每周|每月|每班|每次|每\d+天|每\d+小时|\d+次/天|\d+次/周)
    - (?:自检|互检|交接检|隐蔽验收|旁站|报验|签认|验收合格)\S{0,18}
    - (?:项目经理|项目总工|生产经理|施工员|质检员|安全员|资料员|材料员|机管员|班组长)\S{0,10}(?:负责|牵头|组织|落实)
  regexes: *sol_regex

action_triggers:
  - 巡检
  - 复盘
  - 复核
  - 旁站
  - 交底

