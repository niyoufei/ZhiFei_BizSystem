action_triggers:
- 巡检
- 复盘
- 复核
- 旁站
- 交底
analysis:
  keywords:
  - 风险
  - 难点
  - 重点
  - 痛点
  - 隐患
  - 瓶颈
  - 不利因素
  - 制约
  - 敏感
  - 影响
  - 易
  - 可能
  - 导致
  - 通病
  - 裂缝
  - 沉降
  - 变形
  - 渗漏
  - 坍塌
  - 扰民
  - 交叉作业
  regex: &id001
  - 易\s*产生
  - 易\s*造成
  - 可能\s*发生
  - 存在\s*(?:较大|一定|突出)?\s*(?:风险|隐患|难点|问题)
  - 对\s*质量\s*/?\s*安全\s*/?\s*工期\s*影响
  - (?:扬尘|噪声|夜间施工|交通导改|占道|管线密集|地下水|雨季|高温|冬施)
  regexes: *id001
definition:
  keywords:
  - 采用
  - 选用
  - 规格
  - 型号
  - 强度
  - 等级
  - 标准
  - 工期
  - 频次
  - 阈值
  - 控制指标
  regex: &id002
  - (?i)C\d{2,3}
  - (?i)P\d{1,2}
  - (?i)M\d{2,3}
  - (?i)DN\s*\d{2,4}
  - (?i)\d{1,2}\s*孔
  - (?i)\d{1,3}\s*kV
  - \d+(?:\.\d+)?\s*(?:m3|m³|m2|m²|㎡|㎥|㎠|mm|cm|m|t|kg|台|套|处|项|座|段|根|个)
  - \d+\s*(?:日历天|天|小时|h|d)
  - \d+(?:\.\d+)?\s*%
  regexes: *id002
