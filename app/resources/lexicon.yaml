empty_promises:
  keywords:
  - 确保
  - 严格
  - 全面
  - 坚决
  - 有效
  - 切实
  - 高度重视
  - 务必
  - 保证
  - 全面落实
  - 切实执行
  - 严格落实
solution:
  keywords:
  - 措施
  - 对策
  - 方案
  - 采用
  - 设置
  - 配置
  - 落实
  - 执行
  - 严禁
  - 不得
  - 控制
  - 确保
  - 验收
  - 旁站
  - 巡检
  - 复核
  - 交底
  - 责任人
  - 频次
  - 节点
  regex: &id003
  - (?:采取|采用|设置|增设|配置|落实|执行|实施|组织)\S{0,18}
  - (?:控制在|不大于|不小于|≤|≥|<|>)\s*\d+(?:\.\d+)?
  - (?:每日|每周|每月|每班|每次|每\d+天|每\d+小时|\d+次/天|\d+次/周)
  - (?:自检|互检|交接检|隐蔽验收|旁站|报验|签认|验收合格)\S{0,18}
  - (?:项目经理|技术负责人|施工员|质检员|安全员|资料员|材料员|班组长)\S{0,10}(?:负责|牵头|组织|落实)
  regexes: *id003
version: v2
